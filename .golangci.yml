# golangci-lint v2 configuration for enum-v8.
# Pinned to v2.x in CI (see .github/workflows/ci.yml).
# v2 is required because go.mod declares `go 1.25.0` and v1.64.8
# (the last v1.x release) was compiled with Go 1.24, so its embedded
# type-checker rejects every Go 1.25 package with
# "package requires newer Go version go1.25 (application built with go1.24)".
#
# Local: `golangci-lint run --timeout=5m`

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    
    - misspell
    - revive
    - unused
  settings:
    revive:
      rules:
        - name: var-naming
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1003
        - -ST1020
        - -ST1021
        - -ST1022
  exclusions:
    generated: lax
    paths:
      - data
      - scripts
      - spec
      - src
      - public
      - tests/creationtests/testdata
      - cross-repo
    rules:
      # Generated/legacy enum scaffolding tolerates noisy lint findings
      - path: "_test\\.go$"
        linters: [errcheck]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
