# golangci-lint v2 configuration for enum-v8.
# Pinned to v2.x in CI (see .github/workflows/ci.yml).
# v2 is required because go.mod declares `go 1.25.0` and v1.64.8
# (the last v1.x release) was compiled with Go 1.24.
#
# Local: `golangci-lint run --timeout=5m`
#
# NOTE: This is a public enum library. Method names like `Json`, `JsonPtr`,
# `Sql`, `MySql`, `Dns`, etc. are part of the stable API surface and cannot
# be renamed without breaking every downstream consumer. The revive
# var-naming rule and the `unused` linter are therefore disabled — both
# would flag intentional, generated, or API-stable code.

version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - misspell
    - revive
  settings:
    revive:
      rules:
        # var-naming intentionally omitted: the public API uses Json/Sql/Dns
        # style identifiers that revive's initialism check would flag.
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    generated: lax
    paths:
      - data
      - scripts
      - spec
      - src
      - public
      - tests/creationtests/testdata
      - cross-repo
    rules:
      - path: "_test\\.go$"
        linters: [errcheck]

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
