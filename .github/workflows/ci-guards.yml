name: CI Guards

# Reusable CI guards (spec/12-cicd-pipeline-workflows/03-reusable-ci-guards):
#   - Pattern 03: cross-file collision audit
#   - Pattern 04: baseline-diff lint gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-guards-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/heads/release/') }}

permissions:
  contents: read

jobs:
  python-tests:
    # Unit tests for the CI guard scripts themselves. Runs first so a broken
    # gate script fails fast before the slower lint/collision jobs spend
    # CI minutes producing meaningless results.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run CI guard script tests
        run: python3 -m unittest discover -s scripts/ci -p 'test_*.py' -v

  collision-audit:
    needs: python-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cross-file identifier collision audit
        run: python3 scripts/ci/check-collisions.py .

  issues-index-drift:
    # S-105: fail CI if spec/02-app-issues/README.md and 00-issues-index.md
    # disagree on the set of issue IDs they list.
    needs: python-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: spec/02-app-issues index-drift guard
        run: python3 scripts/ci/check-issues-index-drift.py .

  lint-baseline-diff:
    needs: python-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v1.64.8/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v1.64.8
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Restore lint baseline
        id: baseline-cache
        uses: actions/cache/restore@v4
        with:
          path: .ci-cache/lint-baseline.json
          key: lint-baseline-v1.64.8-refs/heads/main

      - name: Seed baseline from committed snapshot (cache miss)
        if: steps.baseline-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .ci-cache
          cp .ci-baselines/golangci-lint.json .ci-cache/lint-baseline.json


      - name: Run golangci-lint (JSON)
        run: |
          set +e
          mkdir -p .ci-cache
          golangci-lint run --timeout=5m --out-format json ./... > .ci-cache/lint-current.json
          echo "rc=$?"
          # Always continue — the diff script is the actual gate.
          exit 0

      - name: Diff against baseline
        run: |
          python3 scripts/ci/lint-baseline-diff.py \
            .ci-cache/lint-current.json \
            .ci-cache/lint-baseline.json

      # On main, replace the baseline with the current report on success.
      - name: Update baseline (main only)
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: cp .ci-cache/lint-current.json .ci-cache/lint-baseline.json

      - name: Save lint baseline
        if: success() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: .ci-cache/lint-baseline.json
          key: lint-baseline-v1.64.8-refs/heads/main

  spec-api-lint:
    # S-106 fabrication lint — verifies every `package.Symbol` reference in
    # spec/01-app/ resolves to a real package + top-level symbol in the
    # pinned upstream `core-v9` clone. Strict on PRs that touch spec/ or the
    # lint script itself; warn-only otherwise (so unrelated PRs aren't
    # blocked by the 49 known AB-flagged fabrications still pending AJ-01..43).
    needs: python-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone upstream core-v9 @ v1.5.8
        run: |
          git clone --depth 1 --branch v1.5.8 \
            https://github.com/alimtvnetwork/core-v9 /tmp/core-v9-upstream

      - name: Detect spec-touching PR
        id: detect
        run: |
          STRICT=0
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            git fetch --no-tags --depth=1 origin "$BASE" 2>/dev/null || true
            CHANGED=$(git diff --name-only "$BASE" "$HEAD" 2>/dev/null || echo "")
            if echo "$CHANGED" | grep -E '^(spec/|scripts/spec-api-check\.psm1$)' > /dev/null; then
              STRICT=1
            fi
          fi
          echo "strict=$STRICT" >> "$GITHUB_OUTPUT"
          echo "Strict mode: $STRICT"

      - name: Run S-106 spec-API fabrication lint
        shell: pwsh
        run: |
          Import-Module ./scripts/spec-api-check.psm1 -Force -DisableNameChecking
          $strict = '${{ steps.detect.outputs.strict }}' -eq '1'
          if ($strict) {
            Write-Host "STRICT mode: any fabrication fails the job."
            Invoke-SpecApiCheck -SpecDir spec/01-app -UpstreamDir /tmp/core-v9-upstream -StrictExitCode
          } else {
            Write-Host "WARN-ONLY mode: reporting fabrications without failing."
            Invoke-SpecApiCheck -SpecDir spec/01-app -UpstreamDir /tmp/core-v9-upstream
          }

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build Go signature index (S-106 v2)
        run: |
          go run ./scripts/specapisig \
            -roots /tmp/core-v9-upstream,. \
            -out   /tmp/core-v9-sigindex.json

      - name: Run S-106 v2 spec-API signature lint
        shell: pwsh
        run: |
          Import-Module ./scripts/spec-api-sig-check.psm1 -Force -DisableNameChecking
          $strict = '${{ steps.detect.outputs.strict }}' -eq '1'
          if ($strict) {
            Write-Host "STRICT mode: any arity mismatch fails the job."
            Invoke-SpecApiSigCheck -SigIndex /tmp/core-v9-sigindex.json -SpecDir spec/01-app -StrictExitCode
          } else {
            Write-Host "WARN-ONLY mode: reporting arity mismatches without failing."
            Invoke-SpecApiSigCheck -SigIndex /tmp/core-v9-sigindex.json -SpecDir spec/01-app
          }
