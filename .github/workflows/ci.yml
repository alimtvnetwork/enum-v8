name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/heads/release/') }}

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------------
  # SHA-based build deduplication (passthrough gate).
  # See spec/12 §02-go-binary-deploy/01-ci-pipeline.md.
  # -----------------------------------------------------------------------------
  sha-check:
    runs-on: ubuntu-latest
    outputs:
      already-built: ${{ steps.cache-check.outputs.cache-hit }}
    steps:
      - name: Check SHA cache
        id: cache-check
        uses: actions/cache@v4
        with:
          path: /tmp/ci-passed
          key: ci-passed-${{ github.sha }}
          lookup-only: true

  # -----------------------------------------------------------------------------
  # Lint: go vet + golangci-lint (pinned).
  # -----------------------------------------------------------------------------
  lint:
    needs: sha-check
    runs-on: ubuntu-latest
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed CI — skipping lint"

      - uses: actions/checkout@v4
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v5
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        if: needs.sha-check.outputs.already-built != 'true'
        run: go vet ./...

      - uses: golangci/golangci-lint-action@v6
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          version: v1.64.8
          args: --timeout=5m

  # -----------------------------------------------------------------------------
  # Vulnerability scan (in-CI). Third-party = fail; stdlib-only = warn.
  # -----------------------------------------------------------------------------
  vulncheck:
    needs: sha-check
    runs-on: ubuntu-latest
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed CI — skipping vulncheck"

      - uses: actions/checkout@v4
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v5
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        if: needs.sha-check.outputs.already-built != 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          set +e
          govulncheck ./... 2>&1 | tee /tmp/vulncheck.out
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            if grep "packages you import" /tmp/vulncheck.out | grep -qv "0 vulnerabilities in packages"; then
              echo "::error::Third-party vulnerabilities detected"
              exit 1
            fi
            echo "::warning::Only stdlib vulnerabilities found (no fix available in current Go version)"
          fi

  # -----------------------------------------------------------------------------
  # Tests — single shard. Today only `./tests/creationtests/` actually has
  # `_test.go` files; the per-enum packages and `cmdenumtypes/` / `osdetect/`
  # are pure data/declaration packages exercised exclusively through the
  # creation-tests harness. If/when in-package tests are added, split this
  # job into a matrix again.
  # -----------------------------------------------------------------------------
  test:
    needs: [sha-check, lint, vulncheck]
    runs-on: ubuntu-latest
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed CI — skipping tests"

      - uses: actions/checkout@v4
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v5
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          set -uo pipefail
          set +e
          go test ./... -v -count=1 \
            -coverprofile=coverage.out \
            -covermode=atomic 2>&1 | tee test-output.txt
          exit_code=${PIPESTATUS[0]}
          set -e

          if [ "$exit_code" -ne 0 ]; then
            echo "========================================="
            echo " FAILED TESTS"
            echo "========================================="
            grep -E -A 5 '^--- FAIL:' test-output.txt || true
            echo "========================================="
          fi
          exit "$exit_code"

      - uses: actions/upload-artifact@v4
        if: always() && needs.sha-check.outputs.already-built != 'true'
        with:
          name: test-results
          path: |
            test-output.txt
            coverage.out
          retention-days: 7

  # -----------------------------------------------------------------------------
  # Coverage gate + SHA cache write. Stable required-check name preserved
  # for branch protection (`test-summary`) even though the matrix collapsed.
  # -----------------------------------------------------------------------------
  test-summary:
    needs: [sha-check, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed CI — skipping summary"

      - name: Fail if test job did not succeed
        if: needs.sha-check.outputs.already-built != 'true' && needs.test.result != 'success'
        run: |
          echo "::error::test job result = ${{ needs.test.result }}"
          exit 1

      - uses: actions/checkout@v4
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v5
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: go.mod

      - name: Download test artifacts
        if: needs.sha-check.outputs.already-built != 'true'
        uses: actions/download-artifact@v4
        with:
          path: test-artifacts
          pattern: test-results

      - name: Coverage gate (60%)
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          set -euo pipefail
          cov=test-artifacts/test-results/coverage.out
          if [ ! -s "$cov" ]; then
            echo "::error::No coverage profile produced"
            exit 1
          fi
          go tool cover -func="$cov" | tee coverage-summary.txt
          total=$(grep -E '^total:' coverage-summary.txt | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t+0 < 60) ? 1 : 0 }' || {
            echo "::error::Coverage ${total}% is below required 60%"
            exit 1
          }

      - uses: actions/upload-artifact@v4
        if: always() && needs.sha-check.outputs.already-built != 'true'
        with:
          name: coverage-summary
          path: coverage-summary.txt
          retention-days: 14

      # Inline cache write — never split into a separate job.
      - name: Mark SHA as built
        if: success() && needs.sha-check.outputs.already-built != 'true'
        run: mkdir -p /tmp/ci-passed && echo "${{ github.sha }}" > /tmp/ci-passed/sha.txt

      - name: Save SHA to cache
        if: success() && needs.sha-check.outputs.already-built != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/ci-passed
          key: ci-passed-${{ github.sha }}

  # -----------------------------------------------------------------------------
  # Build gate — `go build ./...` only (this is a library, no cross-compile).
  # -----------------------------------------------------------------------------
  build-check:
    needs: [sha-check, test-summary]
    runs-on: ubuntu-latest
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed CI — skipping build-check"

      - uses: actions/checkout@v4
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v5
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: go build ./...
        if: needs.sha-check.outputs.already-built != 'true'
        run: go build ./...
