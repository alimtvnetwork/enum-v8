name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/heads/release/') }}

permissions:
  contents: read

jobs:
  # -----------------------------------------------------------------------------
  # SHA-based build deduplication (passthrough gate).
  # See spec/12 §02-go-binary-deploy/01-ci-pipeline.md.
  # -----------------------------------------------------------------------------
  sha-check:
    runs-on: ubuntu-latest
    outputs:
      already-built: ${{ steps.cache-check.outputs.cache-hit }}
    steps:
      - name: Check SHA cache
        id: cache-check
        uses: actions/cache@v4
        with:
          path: /tmp/ci-passed
          key: ci-passed-${{ github.sha }}
          lookup-only: true

  # -----------------------------------------------------------------------------
  # Lint: go vet + golangci-lint (pinned).
  # -----------------------------------------------------------------------------
  lint:
    needs: sha-check
    runs-on: ubuntu-latest
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed CI — skipping lint"

      - uses: actions/checkout@v4
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v5
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        if: needs.sha-check.outputs.already-built != 'true'
        run: go vet ./...

      - uses: golangci/golangci-lint-action@v6
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          version: v1.64.8
          args: --timeout=5m

  # -----------------------------------------------------------------------------
  # Vulnerability scan (in-CI). Third-party = fail; stdlib-only = warn.
  # -----------------------------------------------------------------------------
  vulncheck:
    needs: sha-check
    runs-on: ubuntu-latest
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed CI — skipping vulncheck"

      - uses: actions/checkout@v4
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v5
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        if: needs.sha-check.outputs.already-built != 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          set +e
          govulncheck ./... 2>&1 | tee /tmp/vulncheck.out
          rc=$?
          set -e
          if [ $rc -ne 0 ]; then
            if grep "packages you import" /tmp/vulncheck.out | grep -qv "0 vulnerabilities in packages"; then
              echo "::error::Third-party vulnerabilities detected"
              exit 1
            fi
            echo "::warning::Only stdlib vulnerabilities found (no fix available in current Go version)"
          fi

  # -----------------------------------------------------------------------------
  # Tests — single shard. Today only `./tests/creationtests/` actually has
  # `_test.go` files; the per-enum packages and `cmdenumtypes/` / `osdetect/`
  # are pure data/declaration packages exercised exclusively through the
  # creation-tests harness. If/when in-package tests are added, split this
  # job into a matrix again.
  # -----------------------------------------------------------------------------
  test:
    needs: [sha-check, lint, vulncheck]
    runs-on: ubuntu-latest
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed CI — skipping tests"

      - uses: actions/checkout@v4
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v5
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          set -uo pipefail
          set +e
          go test ./... -v -count=1 \
            -coverprofile=coverage.out \
            -covermode=atomic 2>&1 | tee test-output.txt
          exit_code=${PIPESTATUS[0]}
          set -e

          if [ "$exit_code" -ne 0 ]; then
            echo "========================================="
            echo " FAILED TESTS"
            echo "========================================="
            grep -E -A 5 '^--- FAIL:' test-output.txt || true
            echo "========================================="
          fi
          exit "$exit_code"

      - uses: actions/upload-artifact@v4
        if: always() && needs.sha-check.outputs.already-built != 'true'
        with:
          name: test-results
          path: |
            test-output.txt
            coverage.out
          retention-days: 7

  # -----------------------------------------------------------------------------
  # Aggregate test results, compute coverage, then INLINE the SHA cache write
  # (per spec — never a separate mark-success job).
  # -----------------------------------------------------------------------------
  test-summary:
    needs: [sha-check, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed CI — skipping summary"

      - uses: actions/checkout@v4
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v5
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: go.mod

      - name: Download all test artifacts
        if: needs.sha-check.outputs.already-built != 'true'
        uses: actions/download-artifact@v4
        with:
          path: test-artifacts
          pattern: test-results-*

      - name: Aggregate failures (copy-paste report)
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          set -uo pipefail
          overall=0
          echo "========================================="
          echo "  ALL TEST RESULTS"
          echo "========================================="
          for dir in test-artifacts/test-results-*; do
            [ -d "$dir" ] || continue
            suite=$(basename "$dir" | sed 's/^test-results-//')
            file="$dir/test-output.txt"
            [ -f "$file" ] || { echo "⚠️  $suite: no output"; continue; }
            pass=$(grep -c '^--- PASS:' "$file" || true)
            fail=$(grep -c '^--- FAIL:' "$file" || true)
            if [ "$fail" -gt 0 ]; then
              echo "❌ $suite: $fail failed, $pass passed"
              overall=1
            else
              echo "✅ $suite: $pass passed"
            fi
          done

          if [ "$overall" -eq 1 ]; then
            echo ""
            echo "========================================="
            echo "  FAILURE REPORT (copy-paste ready)"
            echo "========================================="
            for dir in test-artifacts/test-results-*; do
              file="$dir/test-output.txt"
              [ -f "$file" ] || continue
              fails=$(grep -c '^--- FAIL:' "$file" || true)
              [ "$fails" -gt 0 ] || continue
              suite=$(basename "$dir" | sed 's/^test-results-//')
              echo ""
              echo "-----------------------------------------"
              echo "  Suite: $suite ($fails failed)"
              echo "-----------------------------------------"
              grep -E -A 8 '^--- FAIL:' "$file" | head -200 || true
            done
            echo "::error::Some test suites failed — see failure report above."
            exit 1
          fi

      - name: Merge coverage profiles
        if: needs.sha-check.outputs.already-built != 'true'
        run: |
          set -euo pipefail
          echo "mode: atomic" > combined-coverage.out
          for f in test-artifacts/test-results-*/coverage-*.out; do
            [ -f "$f" ] || continue
            tail -n +2 "$f" >> combined-coverage.out
          done
          go tool cover -func=combined-coverage.out | tee coverage-summary.txt
          total=$(grep -E '^total:' coverage-summary.txt | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          # Coverage threshold (spec/04-tooling/01-ci-pipeline.md): 60%
          awk -v t="$total" 'BEGIN { exit (t+0 < 60) ? 1 : 0 }' || {
            echo "::error::Coverage ${total}% is below required 60%"
            exit 1
          }

      - uses: actions/upload-artifact@v4
        if: always() && needs.sha-check.outputs.already-built != 'true'
        with:
          name: coverage-combined
          path: |
            combined-coverage.out
            coverage-summary.txt
          retention-days: 14

      # Inline cache write — never split into a separate job (spec §Pattern).
      - name: Mark SHA as built
        if: success() && needs.sha-check.outputs.already-built != 'true'
        run: mkdir -p /tmp/ci-passed && echo "${{ github.sha }}" > /tmp/ci-passed/sha.txt

      - name: Save SHA to cache
        if: success() && needs.sha-check.outputs.already-built != 'true'
        uses: actions/cache/save@v4
        with:
          path: /tmp/ci-passed
          key: ci-passed-${{ github.sha }}

  # -----------------------------------------------------------------------------
  # Build gate — `go build ./...` only (this is a library, no cross-compile).
  # -----------------------------------------------------------------------------
  build-check:
    needs: [sha-check, test-summary]
    runs-on: ubuntu-latest
    steps:
      - name: Already validated
        if: needs.sha-check.outputs.already-built == 'true'
        run: echo "✅ SHA ${{ github.sha }} already passed CI — skipping build-check"

      - uses: actions/checkout@v4
        if: needs.sha-check.outputs.already-built != 'true'

      - uses: actions/setup-go@v5
        if: needs.sha-check.outputs.already-built != 'true'
        with:
          go-version-file: go.mod
          cache: true

      - name: go build ./...
        if: needs.sha-check.outputs.already-built != 'true'
        run: go build ./...
